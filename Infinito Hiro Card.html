<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Infinito Hiro | Akasaka Italian Restaurant</title>
<meta name="description" content="イタリア料理界を長年牽引してきた巨匠―山田宏巳。手掛けるのは、全国から取り寄せた旬の食材の美味しさを最大限引き出したシンプルなイタリアン。熟練の繊細な技と自由な発想、そして人脈に裏打ちされた逸品の数々をご堪能ください。" />
<meta property="og:title" content="Infinito Hiro" />
<meta property="og:description" content="イタリア料理界を長年牽引してきた巨匠―山田宏巳。全国から取り寄せた旬の食材を活かしたシンプルなイタリアン。" />
<meta property="og:type" content="website" />
<link rel="stylesheet" href="card.css" />
<style>
  /* Preview shell — black letterbox so the card frame floats on a quiet stage */
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #0d0c0b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 28px 0;
  }
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
  }
  /* Make the iOS frame's screen scrollable */
  .ih-screen-host {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    background: var(--paper, #f1ede5);
  }
  /* Hide scrollbars in the inner screen for a cleaner mock */
  .ih-screen-host::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="card.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <IOSDevice width={402} height={874}>
          <Card />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('stage')).render(<App />);
  </script>
</body>
</html>
